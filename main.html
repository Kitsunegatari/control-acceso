<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Visitantes</title>
    <link rel="stylesheet" href="src/css/estilo.css">
</head>
<body>

<div class="form-container">
    <h2>Registro de Visitante</h2>

    <input type="text" id="nombre" placeholder="Nombre completo">
    <input type="number" id="cc" placeholder="Cédula">
    <input type="text" id="destino" placeholder="Destino">
    
    <select id="puerta">
        <option value="">Seleccione puerta</option>
        <option value="P1">Principal</option>
        <option value="P2">Secundaria</option>
        <option value="P3">Garaje</option>
    </select>

    <select id="tipo">
        <option value="">Tipo de registro</option>
        <option value="INGRESO">Ingreso</option>
        <option value="SALIDA">Salida</option>
    </select>

    <button onclick="registrar()">Registrar</button>

    
</div>


<script src="src/js/app.js"></script>
</body>
</html>
